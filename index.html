<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ASTRO HARVEST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; }
    body { font-family: 'Share Tech Mono', monospace; color: #e8dcc8; height: 100dvh; touch-action: none; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
  <script type="module" crossorigin src="/assets/index-C0BSSbE0.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CA9eqoe5.css">
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD Overlay -->
  <div id="hud-overlay" style="visibility:hidden">

    <!-- Top resource bar -->
    <div id="top-bar">
      <button id="menu-btn" title="Menu [ESC]">&#x2630;</button>
      <div id="resources">
        <div class="rc">
          <div class="rc-icon">&#x2B21;</div>
          <div class="rc-info">
            <div class="rc-lbl">ORE</div>
            <div class="rc-val" id="vOre">0</div>
          </div>
          <div class="rc-rate" id="rOre">+0/s</div>
        </div>
        <div class="rc-sep"></div>
        <div class="rc" id="rcCrys" style="display:none">
          <div class="rc-icon">&#x25C8;</div>
          <div class="rc-info">
            <div class="rc-lbl">CRYSTAL</div>
            <div class="rc-val" id="vCrys">0</div>
          </div>
          <div class="rc-rate" id="rCrys">+0/s</div>
        </div>
        <div class="rc-sep" id="sepCrys" style="display:none"></div>
        <div class="rc" id="rcEnrg" style="display:none">
          <div class="rc-icon">&#9889;</div>
          <div class="rc-info">
            <div class="rc-lbl">ENERGY</div>
            <div class="rc-val" id="vEnrg">0</div>
          </div>
          <div class="rc-rate" id="rEnrg">+0/s</div>
        </div>
      </div>
    </div>

    <!-- Bottom bar: Vic3-style tabs + centered upgrades -->
    <div id="bottom-bar">
      <!-- Tab-rad -->
      <div id="bar-tab-row">
        <div id="bar-tabs">
          <button class="bar-tab active" data-cat="mining">
            <span class="tab-icon">&#x26CF;</span>
            <span class="tab-label">MINING</span>
            <span class="tab-badge" id="tbadge-mining"></span>
          </button>
          <button class="bar-tab" data-cat="robots">
            <span class="tab-icon">&#x1F916;</span>
            <span class="tab-label">ROBOTS</span>
            <span class="tab-badge" id="tbadge-robots"></span>
          </button>
          <button class="bar-tab" data-cat="tech">
            <span class="tab-icon">&#x1F52C;</span>
            <span class="tab-label">TECH</span>
            <span class="tab-badge" id="tbadge-tech"></span>
          </button>
        </div>
        <button id="bar-minimize" title="Minimize [Tab]">&#x25BC;</button>
      </div>
      <!-- Upgrade-rad -->
      <div id="bar-upgrade-row">
        <div id="bar-upgrades"></div>
        <div id="bar-mult">
          <button class="mbtn on" id="m1">&times;1</button>
          <button class="mbtn" id="m10">&times;10</button>
          <button class="mbtn" id="m100">&times;100</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Tooltips -->
  <div id="upg-tooltip"></div>
  <div id="planet-tooltip"></div>

  <!-- Toast -->
  <div id="toast"></div>

</body>
</html>
