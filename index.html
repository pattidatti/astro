<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ASTRO HARVEST</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/ui/HUD.css">
  <link rel="stylesheet" href="/src/ui/LandingScreen.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; }
    body { font-family: 'Share Tech Mono', monospace; color: #e8dcc8; height: 100dvh; touch-action: none; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD Overlay -->
  <div id="hud-overlay" style="visibility:hidden">

    <!-- Top navigation buttons -->
    <div id="top-nav">
      <button id="menu-btn" title="Menu [ESC]">&#x2630; MENU</button>
      <button id="research-btn" title="Research Tree [T]">RESEARCH <span class="btn-key">T</span></button>
    </div>

    <!-- Enemy threat summary bar (top-center) -->
    <div id="enemy-threat-bar" style="display:none"></div>
    <div id="enemy-threat-tooltip"></div>

    <!-- FPS counter -->
    <div id="fps-counter"></div>

    <!-- Top-left minimap panel -->
    <div id="top-left-hud"></div>

    <!-- Left floating panel — Space Base -->
    <div id="panel-left" class="planet-panel">
      <div class="panel-header">
        <span class="panel-planet-icon">&#x2B21;</span>
        <span class="panel-planet-name">SPACE BASE</span>
        <button class="panel-close" id="panel-close">&#x2715;</button>
      </div>
      <div class="panel-tabs" id="panel-left-tabs">
        <button class="panel-tab active" data-tab="base">BASE</button>
        <button class="panel-tab" data-tab="routes">ROUTES</button>
      </div>
      <div class="panel-body">
        <div class="panel-tab-content" data-tab="base">
          <div class="panel-section" id="panel-base"></div>
          <div class="panel-section" id="panel-colony-ship"></div>
          <div class="panel-section" id="panel-silos"></div>
        </div>
        <div class="panel-tab-content" data-tab="routes" style="display:none">
          <div class="panel-section" id="panel-routes"></div>
        </div>
      </div>
    </div>

    <!-- Right floating panel — Robots -->
    <div id="panel-right" class="planet-panel">
      <div class="panel-header">
        <span class="panel-planet-icon">&#x1F916;</span>
        <span class="panel-planet-name">ROBOTS</span>
      </div>
      <div class="panel-tabs" id="panel-right-tabs">
        <button class="panel-tab active" data-tab="robots">ROBOTS</button>
        <button class="panel-tab" data-tab="defense">DEFENSE</button>
        <button class="panel-tab" data-tab="upgrades">UPG</button>
      </div>
      <div class="panel-body">
        <div class="panel-tab-content" data-tab="robots">
          <div class="panel-section" id="panel-robots-hire"></div>
          <div class="panel-section" id="panel-robots-active"></div>
        </div>
        <div class="panel-tab-content" data-tab="defense" style="display:none">
          <div class="panel-section" id="panel-defenses"></div>
        </div>
        <div class="panel-tab-content" data-tab="upgrades" style="display:none">
          <div class="panel-section" id="panel-robots-upgrades"></div>
        </div>
      </div>
    </div>

    <!-- Military Base Panels (replaces planet panels when base is selected) -->
    <div id="mil-panel-left" class="military-panel mil-panel-left">
      <div class="mil-panel-header">
        <span class="mil-panel-icon">⚔</span>
        <span class="mil-panel-name" id="mil-panel-name">MILITARY BASE</span>
        <button class="mil-panel-close" id="mil-panel-close">&#x2715;</button>
      </div>
      <div class="mil-panel-body" id="mil-panel-body"></div>
    </div>

    <div id="mil-panel-right" class="military-panel mil-panel-right">
      <div class="mil-panel-header">
        <span class="mil-panel-icon">🚀</span>
        <span class="mil-panel-name">FLEET COMMAND</span>
      </div>
      <div class="mil-panel-body" id="mil-panel-body-right"></div>
    </div>

    <!-- Tutorial hand pointer -->
    <div id="tutorial-hand">
      <div class="tutorial-bubble">
        <button class="tutorial-dismiss-btn" title="Skip step">×</button>
        <span class="tutorial-bubble-text"></span>
      </div>
      <div class="tutorial-pointer"></div>
    </div>

  </div>

  <!-- Tooltips -->
  <div id="upg-tooltip"></div>
  <div id="planet-tooltip"></div>
  <div id="hover-target-box">
    <div class="tb-corner tl"></div>
    <div class="tb-corner tr"></div>
    <div class="tb-corner bl"></div>
    <div class="tb-corner br"></div>
  </div>

  <!-- Colony ship target popup -->
  <div id="colony-ship-popup" class="colony-ship-popup"></div>

  <!-- Toast queue -->
  <div id="toast-container"></div>

  <!-- Lock-on tooltip (defense satellites / patrol ships) -->
  <div id="lockOn-tooltip"></div>

  <!-- Tech Tree Modal -->
  <div id="tech-tree-overlay" class="tech-overlay">
    <div id="tech-tree-modal" class="tech-modal">
      <div class="tech-modal-header">
        <span class="tech-modal-title">RESEARCH TREE</span>
        <span class="tech-modal-subtitle">Cost deducted from focused planet energy silo</span>
        <span id="tech-modal-energy" class="tech-modal-energy">&#x26A1; 0</span>
        <button id="tech-close-btn" class="tech-close-btn">&#x2715;</button>
      </div>
      <div class="tech-modal-body">
        <div id="tech-tree-viewport">
          <svg id="tech-tree-svg"></svg>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
