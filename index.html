<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ASTRO HARVEST</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/ui/HUD.css">
  <link rel="stylesheet" href="/src/ui/LandingScreen.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; }
    body { font-family: 'Share Tech Mono', monospace; color: #e8dcc8; height: 100dvh; touch-action: none; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD Overlay -->
  <div id="hud-overlay" style="visibility:hidden">

    <!-- Menu button (top-left) -->
    <button id="menu-btn" title="Menu [ESC]">&#x2630;</button>

    <!-- Left floating panel — Space Base -->
    <div id="panel-left" class="planet-panel">
      <div class="panel-header">
        <span class="panel-planet-icon">&#x2B21;</span>
        <span class="panel-planet-name">SPACE BASE</span>
        <button class="panel-close" id="panel-close">&#x2715;</button>
      </div>
      <div class="panel-body">
        <div class="panel-section" id="panel-base">
          <!-- Populated by PlanetPanel.js -->
        </div>
        <div class="panel-section" id="panel-silos">
          <!-- Resource silos -->
        </div>
        <div class="panel-section" id="panel-routes">
          <!-- Ship routes -->
        </div>
      </div>
    </div>

    <!-- Right floating panel — Robots -->
    <div id="panel-right" class="planet-panel">
      <div class="panel-header">
        <span class="panel-planet-icon">&#x1F916;</span>
        <span class="panel-planet-name">ROBOTS</span>
      </div>
      <div class="panel-body">
        <div class="panel-section" id="panel-robots-hire">
          <!-- Robot hire buttons -->
        </div>
        <div class="panel-section" id="panel-robots-active">
          <!-- Active robot list -->
        </div>
        <div class="panel-section" id="panel-robots-upgrades">
          <!-- Robot specialization upgrades -->
        </div>
      </div>
    </div>

    <!-- Tutorial hand pointer -->
    <div id="tutorial-hand">
      <div class="tutorial-bubble"></div>
      <div class="tutorial-pointer">&#9660;</div>
    </div>

  </div>

  <!-- Tooltips -->
  <div id="upg-tooltip"></div>
  <div id="planet-tooltip"></div>
  <div id="station-target-box">
    <div class="tb-corner tl"></div>
    <div class="tb-corner tr"></div>
    <div class="tb-corner bl"></div>
    <div class="tb-corner br"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
