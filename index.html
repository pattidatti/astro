<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ASTRO HARVEST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020509; }
    body { font-family: 'Share Tech Mono', monospace; color: #c8e8ff; height: 100dvh; display: flex; flex-direction: column; touch-action: none; }
    #game-container { position: fixed; inset: 0; z-index: 1; }
    #game-container canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
  <script type="module" crossorigin src="/assets/index-Ab10XF_U.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BK3J3TV8.css">
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD Overlay -->
  <div id="hud-overlay">
    <!-- Top resource bar -->
    <div id="hud">
      <div id="logo">ASTRO HARVEST<span>GALACTIC EXTRACTION v4.2</span></div>
      <div id="resources">
        <div class="rc">
          <div class="rc-val" id="vOre">0</div>
          <div class="rc-lbl">&#x2B21; ORE</div>
          <div class="rc-rate" id="rOre">+0/s</div>
        </div>
        <div class="rc-sep"></div>
        <div class="rc" id="rcCrys" style="display:none">
          <div class="rc-val" id="vCrys">0</div>
          <div class="rc-lbl">&#x25C8; CRYST</div>
          <div class="rc-rate" id="rCrys">+0/s</div>
        </div>
        <div class="rc-sep" id="sepCrys" style="display:none"></div>
        <div class="rc" id="rcEnrg" style="display:none">
          <div class="rc-val" id="vEnrg">0</div>
          <div class="rc-lbl">&#9889; ENRG</div>
          <div class="rc-rate" id="rEnrg">+0/s</div>
        </div>
      </div>
    </div>

    <!-- Bottom panel -->
    <div id="panel">
      <div id="tabbar">
        <button class="tabbtn on" id="tu">&#x2B21; UPGRADES</button>
        <button class="tabbtn" id="tg">&#x2299; GALAXY</button>
      </div>
      <div id="stats">
        <div class="sv"><div class="sv-n" id="sRob">0</div><div class="sv-l">DRONES</div></div>
        <div class="sv"><div class="sv-n" id="sWld">1</div><div class="sv-l">WORLDS</div></div>
        <div class="sv"><div class="sv-n" id="sClk">1</div><div class="sv-l">CLICK</div></div>
        <div class="sv"><div class="sv-n" id="sRate">0</div><div class="sv-l">ORE/S</div></div>
      </div>
      <div id="scroll">
        <div id="tabU">
          <div id="multrow">
            <button class="mbtn on" id="m1">&times;1</button>
            <button class="mbtn" id="m10">&times;10</button>
            <button class="mbtn" id="m100">&times;100</button>
          </div>
          <div id="upgGrid"></div>
        </div>
        <div id="tabG" style="display:none">
          <div id="pList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

</body>
</html>
