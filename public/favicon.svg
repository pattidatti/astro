<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0a0e14"/>

  <!-- Ring: back arc (top half, behind planet) -->
  <path d="M 3 16 A 13 5 0 0 0 29 16" fill="none" stroke="#4a7a4e" stroke-width="2" opacity="0.7"/>

  <!-- Planet -->
  <defs>
    <radialGradient id="pg" cx="38%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#e8c870"/>
      <stop offset="55%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#7a5820"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="9" fill="url(#pg)"/>

  <!-- Ring: front arc (bottom half, in front of planet) -->
  <path d="M 3 16 A 13 5 0 0 1 29 16" fill="none" stroke="#7cb85e" stroke-width="2"/>

  <!-- Star sparkles -->
  <circle cx="4" cy="4" r="1" fill="#c8a84e" opacity="0.7"/>
  <circle cx="27" cy="5" r="0.8" fill="#7cb85e" opacity="0.6"/>
  <circle cx="5" cy="27" r="0.8" fill="#c8a84e" opacity="0.5"/>
  <circle cx="27" cy="27" r="1" fill="#7cb85e" opacity="0.5"/>
</svg>
